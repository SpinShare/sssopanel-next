name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    paths:
      - 'SSSOPanel/**'
      - '.github/workflows/ci.yml'

jobs:
  verify:
    name: lint & build (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.x

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install UI dependencies
        working-directory: SSSOPanel/UserInterface
        run: npm install

      - name: Lint UI
        working-directory: SSSOPanel/UserInterface
        run: npm run lint

      - name: Build UI
        working-directory: SSSOPanel/UserInterface
        run: npm run build

      - name: Stage UI build into wwwroot
        run: |
          rm -rf SSSOPanel/Resources/wwwroot/assets
          cp -r SSSOPanel/UserInterface/dist/. SSSOPanel/Resources/wwwroot/
        shell: bash

      - name: Restore .NET dependencies
        working-directory: SSSOPanel
        run: dotnet restore --runtime ${{ matrix.rid }} SSSOPanel.csproj

      - name: Build .NET
        working-directory: SSSOPanel
        run: dotnet build SSSOPanel.csproj --configuration Release --no-restore --runtime ${{ matrix.rid }}

      - name: Upload UI dist
        uses: actions/upload-artifact@v6
        with:
          name: ui-dist-${{ matrix.rid }}
          path: SSSOPanel/UserInterface/dist
          if-no-files-found: error