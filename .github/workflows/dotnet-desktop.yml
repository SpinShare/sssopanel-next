name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/*'
    paths:
      - 'SSSOPanel/**'

jobs:
  build:
    name: build (linux-x64)
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install UI dependencies
        working-directory: SSSOPanel/UserInterface
        run: npm install

      - name: Build UI
        working-directory: SSSOPanel/UserInterface
        run: npm run build

      - name: Stage UI build into wwwroot
        run: |
          rm -rf SSSOPanel/Resources/wwwroot/assets
          cp -r SSSOPanel/UserInterface/dist/. SSSOPanel/Resources/wwwroot/

      - name: Publish & package (ElectronNET.Core + electron-builder)
        working-directory: SSSOPanel
        run: dotnet publish -c Release

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SSSOPanel-linux-x64
          path: |
            SSSOPanel/bin/Release/net10.0/linux-x64/publish/*.tar.xz
            SSSOPanel/bin/Release/net10.0/linux-x64/publish/*.AppImage

  release:
    name: release
    needs: build
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve build artifacts
        uses: actions/download-artifact@v4
        with:
          name: SSSOPanel-linux-x64
          path: SSSOPanel-linux-x64

      - name: List Files
        run: ls -lp SSSOPanel-linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SSSOPanel-linux-x64/*.tar.xz
            SSSOPanel-linux-x64/*.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          name: Release ${{ github.event.repository.updated_at }}
          draft: true
          prerelease: true
