name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/*'
    paths:
      - 'SSSOPanel/**'

jobs:
  build:
    name: build (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact-glob: '*.AppImage'
          - os: windows-latest
            rid: win-x64
            artifact-glob: '*-setup.exe'
    permissions: write-all
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.x

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install UI dependencies
        working-directory: SSSOPanel/UserInterface
        run: npm install

      - name: Build UI
        working-directory: SSSOPanel/UserInterface
        run: npm run build

      - name: Stage UI build into wwwroot
        run: |
          rm -rf SSSOPanel/Resources/wwwroot/assets
          cp -r SSSOPanel/UserInterface/dist/. SSSOPanel/Resources/wwwroot/
        shell: bash

      - name: Publish & package (ElectronNET.Core + electron-builder)
        working-directory: SSSOPanel
        run: dotnet publish SSSOPanel.csproj -c Release -r ${{ matrix.rid }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: SSSOPanel-${{ matrix.rid }}
          path: SSSOPanel/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 90

  release:
    name: release
    needs: build
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve Linux artifacts
        uses: actions/download-artifact@v7
        with:
          name: SSSOPanel-linux-x64
          path: SSSOPanel-linux-x64

      - name: Retrieve Windows artifacts
        uses: actions/download-artifact@v7
        with:
          name: SSSOPanel-win-x64
          path: SSSOPanel-win-x64

      - name: List Files
        run: |
          ls -lp SSSOPanel-linux-x64
          ls -lp SSSOPanel-win-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SSSOPanel-linux-x64/*.AppImage
            SSSOPanel-win-x64/*-setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          name: Release ${{ github.event.repository.updated_at }}
          draft: true
          prerelease: true